<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 雪子助手的小龙虾之家</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 左上角统计面板 -->
    <div class="stats-panel">
        <div class="stats-header">📊 今日统计</div>
        <div class="stat-item">
            <span class="stat-label">完成任务:</span>
            <span class="stat-value" id="task-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Token消耗:</span>
            <span class="stat-value" id="token-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">工作时长:</span>
            <span class="stat-value" id="work-time">0h 0m</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">当前位置:</span>
            <span class="stat-value location-badge" id="current-room">客厅</span>
        </div>
    </div>

    <!-- 主游戏区域 -->
    <div class="game-container">
        <!-- 房子主体 -->
        <div class="house" id="house">
            <!-- 房子标题 -->
            <div class="house-title">🏠 雪子助手的家</div>
            
            <!-- 房间布局 -->
            <div class="house-layout">
                <!-- 第一行：卧室 + 游戏室 -->
                <div class="room-row">
                    <div class="room bedroom" data-room="bedroom" id="room-bedroom">
                        <div class="room-header">
                            <span class="room-icon">🛏️</span>
                            <span class="room-name">卧室</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture bed">
                                <div class="pillow"></div>
                                <div class="blanket"></div>
                            </div>
                            <div class="furniture nightstand">
                                <div class="lamp"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="room gameroom" data-room="gameroom" id="room-gameroom">
                        <div class="room-header">
                            <span class="room-icon">🎮</span>
                            <span class="room-name">游戏室</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture gaming-chair">
                                <div class="chair-back"></div>
                            </div>
                            <div class="furniture gaming-setup">
                                <div class="monitor"></div>
                                <div class="pc-case"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 第二行：客厅 + 工作室 -->
                <div class="room-row">
                    <div class="room livingroom" data-room="livingroom" id="room-livingroom">
                        <div class="room-header">
                            <span class="room-icon">📺</span>
                            <span class="room-name">客厅</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture sofa">
                                <div class="sofa-cushion"></div>
                            </div>
                            <div class="furniture tv-set">
                                <div class="tv-screen"></div>
                                <div class="tv-stand"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="room workspace" data-room="workspace" id="room-workspace">
                        <div class="room-header">
                            <span class="room-icon">💻</span>
                            <span class="room-name">工作室</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture desk">
                                <div class="laptop"></div>
                                <div class="coffee">☕</div>
                            </div>
                            <div class="furniture office-chair"></div>
                            <div class="furniture bookshelf-work">
                                <div class="book-w"></div>
                                <div class="book-w"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 第三行：餐厅 + 卫生间 -->
                <div class="room-row">
                    <div class="room dining" data-room="dining" id="room-dining">
                        <div class="room-header">
                            <span class="room-icon">🍽️</span>
                            <span class="room-name">餐厅</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture dining-table">
                                <div class="plate">🍜</div>
                                <div class="plate">🍚</div>
                            </div>
                            <div class="furniture dining-chair"></div>
                            <div class="furniture dining-chair"></div>
                        </div>
                    </div>
                    
                    <div class="room bathroom" data-room="bathroom" id="room-bathroom">
                        <div class="room-header">
                            <span class="room-icon">🚽</span>
                            <span class="room-name">卫生间</span>
                        </div>
                        <div class="room-content">
                            <div class="furniture toilet">
                                <div class="toilet-lid"></div>
                            </div>
                            <div class="furniture sink-bath">
                                <div class="mirror"></div>
                            </div>
                            <div class="furniture towel-rack"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 门（去操场） -->
            <div class="door-to-playground">
                <div class="door">🚪</div>
                <div class="arrow">↓</div>
            </div>
        </div>
        
        <!-- 操场（房子外面） -->
        <div class="playground-area" data-room="playground" id="room-playground">
            <div class="playground-header">🏃 运动场</div>
            
            <div class="playground-content">
                <div class="ground-track"></div>
                <div class="playground-item basketball-hoop">🏀</div>
                <div class="playground-item dumbbell-set">🏋️</div>
                <div class="playground-item yoga-mat">🧘</div>
            </div>
        </div>

        <!-- 小龙虾 -->
        <div class="lobster" id="lobster">
            <div class="lobster-body">
                <!-- 身体 -->
                <div class="body-main"></div>
                <!-- 头 -->
                <div class="head">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="antenna left"></div>
                    <div class="antenna right"></div>
                </div>
                <!-- 钳子 -->
                <div class="claw left">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <div class="claw right">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <!-- 尾巴 -->
                <div class="tail">
                    <div class="tail-seg"></div>
                    <div class="tail-seg"></div>
                    <div class="tail-fin"></div>
                </div>
            </div>
            <!-- 情绪气泡 -->
            <div class="emotion-bubble" id="emotion">😊</div>
            <!-- 阴影 -->
            <div class="shadow"></div>
        </div>

        <!-- 对话气泡 -->
        <div class="speech-bubble" id="speech-bubble">
            <p id="speech-text">欢迎来到我家！🏠🦞</p>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span class="label">当前活动:</span>
            <span id="current-activity">休息中</span>
        </div>
        <div class="status-item">
            <span class="label">心情:</span>
            <span id="mood">开心</span>
        </div>
        <div class="status-item">
            <span class="label">上次活动:</span>
            <span id="last-activity">刚刚</span>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
