<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 雪子助手的小龙虾工作室</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 左上角统计面板 -->
    <div class="stats-panel">
        <div class="stats-header">📊 今日统计</div>
        <div class="stat-item">
            <span class="stat-label">完成任务:</span>
            <span class="stat-value" id="task-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Token消耗:</span>
            <span class="stat-value" id="token-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">工作时长:</span>
            <span class="stat-value" id="work-time">0h 0m</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">当前状态:</span>
            <span class="stat-value status-badge" id="current-status">休息中</span>
        </div>
    </div>

    <!-- 主场景区域 -->
    <div class="scene-container">
        <!-- 背景场景 -->
        <div class="background-scene" id="bg-scene">
            <!-- 像素装饰元素 -->
            <div class="pixel-cloud" style="top: 20px; left: 10%;"></div>
            <div class="pixel-cloud" style="top: 40px; left: 70%;"></div>
            <div class="pixel-star" style="top: 30px; left: 20%;"></div>
            <div class="pixel-star" style="top: 50px; left: 80%;"></div>
        </div>

        <!-- 小龙虾角色 -->
        <div class="lobster-container" id="lobster">
            <!-- 情绪表情 -->
            <div class="emotion-badge" id="emotion">😊</div>
            
            <!-- 像素小龙虾 -->
            <div class="pixel-lobster">
                <!-- 左眼 -->
                <div class="eye left-eye">
                    <div class="pupil"></div>
                </div>
                <!-- 右眼 -->
                <div class="eye right-eye">
                    <div class="pupil"></div>
                </div>
                <!-- 触角 -->
                <div class="antenna left-antenna"></div>
                <div class="antenna right-antenna"></div>
                <!-- 身体 -->
                <div class="body">
                    <div class="body-segment seg1"></div>
                    <div class="body-segment seg2"></div>
                    <div class="body-segment seg3"></div>
                </div>
                <!-- 大钳子 -->
                <div class="claw left-claw" id="left-claw">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <div class="claw right-claw" id="right-claw">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <!-- 尾巴 -->
                <div class="tail">
                    <div class="tail-segment t1"></div>
                    <div class="tail-segment t2"></div>
                    <div class="tail-segment t3"></div>
                    <div class="tail-fin"></div>
                </div>
            </div>

            <!-- 场景道具 -->
            <div class="prop computer" id="prop-computer" style="display: none;">
                <div class="monitor"></div>
                <div class="keyboard"></div>
                <div class="screen-glow"></div>
            </div>
            <div class="prop book" id="prop-book" style="display: none;">
                <div class="book-body"></div>
                <div class="book-pages"></div>
            </div>
            <div class="prop dumbbell" id="prop-dumbbell" style="display: none;">
                <div class="dumbbell-bar"></div>
                <div class="dumbbell-weight left"></div>
                <div class="dumbbell-weight right"></div>
            </div>
            <div class="prop bowl" id="prop-bowl" style="display: none;">
                <div class="bowl-body"></div>
                <div class="steam"></div>
                <div class="heart">❤️</div>
            </div>
        </div>

        <!-- 状态气泡 -->
        <div class="speech-bubble" id="speech-bubble">
            <p id="speech-text">你好！我是雪子助手 🦞</p>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span class="label">上次活动:</span>
            <span id="last-activity">刚刚</span>
        </div>
        <div class="status-item">
            <span class="label">今日心情:</span>
            <span id="mood">元气满满</span>
        </div>
    </div>

    <!-- 场景切换按钮 -->
    <div class="scene-buttons">
        <button class="scene-btn active" data-scene="resting" title="休息室">🏠</button>
        <button class="scene-btn" data-scene="working" title="工作中">💻</button>
        <button class="scene-btn" data-scene="thinking" title="思考中">📚</button>
        <button class="scene-btn" data-scene="exercising" title="运动中">💪</button>
        <button class="scene-btn" data-scene="eating" title="吃饭中">🍜</button>
        <button class="scene-btn" data-scene="sleeping" title="睡觉中">😴</button>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
