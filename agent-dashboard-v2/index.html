<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 雪子助手的小龙虾之家</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 左上角统计面板 -->
    <div class="stats-panel">
        <div class="stats-header">📊 今日统计</div>
        <div class="stat-item">
            <span class="stat-label">完成任务:</span>
            <span class="stat-value" id="task-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Token消耗:</span>
            <span class="stat-value" id="token-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">工作时长:</span>
            <span class="stat-value" id="work-time">0h 0m</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">当前位置:</span>
            <span class="stat-value location-badge" id="current-room">休息室</span>
        </div>
    </div>

    <!-- 主游戏区域 -->
    <div class="game-container">
        <!-- 房子 -->
        <div class="house" id="house">
            <!-- 房间网格 -->
            <div class="room-grid">
                <!-- 第一行 -->
                <div class="room study" data-room="study" id="room-study">
                    <div class="room-label">📚 书房</div>
                    <div class="furniture bookshelf">
                        <div class="book"></div>
                        <div class="book"></div>
                        <div class="book"></div>
                    </div>
                    <div class="furniture desk">
                        <div class="lamp"></div>
                    </div>
                </div>
                
                <div class="room workspace" data-room="workspace" id="room-workspace">
                    <div class="room-label">💻 工作室</div>
                    <div class="furniture computer-desk">
                        <div class="monitor"></div>
                        <div class="keyboard"></div>
                    </div>
                    <div class="furniture chair"></div>
                </div>
                
                <div class="room gameroom" data-room="gameroom" id="room-gameroom">
                    <div class="room-label">🎮 游戏室</div>
                    <div class="furniture tv">
                        <div class="screen"></div>
                    </div>
                    <div class="furniture game-chair"></div>
                </div>
                
                <!-- 第二行 -->
                <div class="room bedroom" data-room="bedroom" id="room-bedroom">
                    <div class="room-label">🛏️ 休息室</div>
                    <div class="furniture bed">
                        <div class="pillow"></div>
                        <div class="blanket"></div>
                    </div>
                    <div class="furniture nightstand">
                        <div class="lamp-small"></div>
                    </div>
                </div>
                
                <div class="room bathroom" data-room="bathroom" id="room-bathroom">
                    <div class="room-label">🚽 卫生间</div>
                    <div class="furniture toilet">
                        <div class="lid"></div>
                    </div>
                    <div class="furniture sink"></div>
                </div>
                
                <div class="room kitchen" data-room="kitchen" id="room-kitchen">
                    <div class="room-label">🍜 厨房</div>
                    <div class="furniture stove"></div>
                    <div class="furniture fridge"></div>
                    <div class="furniture dining-table">
                        <div class="bowl"></div>
                    </div>
                </div>
            </div>
            
            <!-- 操场（底部大区域） -->
            <div class="playground" data-room="playground" id="room-playground">
                <div class="room-label">🏃 操场</div>
                <div class="track"></div>
                <div class="dumbbell"></div>
                <div class="yoga-mat"></div>
            </div>
        </div>

        <!-- 小龙虾 -->
        <div class="lobster" id="lobster">
            <div class="lobster-body">
                <!-- 身体 -->
                <div class="body-main"></div>
                <!-- 头 -->
                <div class="head">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="antenna left"></div>
                    <div class="antenna right"></div>
                </div>
                <!-- 钳子 -->
                <div class="claw left">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <div class="claw right">
                    <div class="claw-arm"></div>
                    <div class="claw-hand"></div>
                </div>
                <!-- 尾巴 -->
                <div class="tail">
                    <div class="tail-seg"></div>
                    <div class="tail-seg"></div>
                    <div class="tail-fin"></div>
                </div>
            </div>
            <!-- 情绪气泡 -->
            <div class="emotion-bubble" id="emotion">😊</div>
            <!-- 阴影 -->
            <div class="shadow"></div>
        </div>

        <!-- 对话气泡 -->
        <div class="speech-bubble" id="speech-bubble">
            <p id="speech-text">欢迎来到我的家！🦞</p>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span class="label">当前活动:</span>
            <span id="current-activity">休息中</span>
        </div>
        <div class="status-item">
            <span class="label">心情:</span>
            <span id="mood">开心</span>
        </div>
        <div class="status-item">
            <span class="label">上次活动:</span>
            <span id="last-activity">刚刚</span>
        </div>
    </div>

    <!-- 历史图表区域 -->
    <div class="charts-container" id="charts-container">
        <h3>📈 近7天统计</h3>
        <div class="charts-grid">
            <div class="chart-box">
                <h4>任务完成趋势</h4>
                <canvas id="tasks-chart"></canvas>
            </div>
            <div class="chart-box">
                <h4>Token消耗</h4>
                <canvas id="tokens-chart"></canvas>
            </div>
            <div class="chart-box">
                <h4>房间停留时间</h4>
                <canvas id="rooms-chart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
