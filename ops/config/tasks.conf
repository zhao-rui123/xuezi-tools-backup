#===============================================================================
# tasks.conf - 统一任务配置（YAML格式）
#===============================================================================
# 路径: ~/.openclaw/ops/config/tasks.conf
# 说明: 所有定时任务在此声明，task-scheduler.sh 统一读取执行
#===============================================================================

scheduler:
  timezone: "Asia/Shanghai"
  lock_dir: "~/.openclaw/ops/lock"
  log_dir: "~/.openclaw/ops/logs/tasks"
  status_dir: "~/.openclaw/ops/status/tasks"
  alert_on_failure: true
  alert_on_success: false

#===============================================================
# 每日任务（每天执行）
#===============================================================
daily:

  - id: backup_full
    name: "每日完整备份"
    schedule: "00 22 * * *"
    group: backup
    script: "backup-runner.sh"
    args: ["--type", "full"]
    timeout: 3600
    retry: 1
    retry_delay: 1800
    notify: success
    depends: []

  - id: stock_push
    name: "股票自选股日报"
    schedule: "30 16 * * 1-5"
    group: report
    script: "python3"
    args: ["scripts/stock_push_fast.py"]
    timeout: 300
    retry: 0
    notify: failure
    depends: []
    cwd: "~/.openclaw/workspace"

  - id: memory_evolution
    name: "每日自我进化"
    schedule: "00 23 * * *"
    group: memory
    script: "scheduler.py"
    args: ["run", "evolution-daily"]
    timeout: 1800
    retry: 0
    notify: none
    depends: []
    interpreter: "python3"
    cwd: "~/.openclaw/workspace/skills/memory-suite-v4"

  - id: memory_archive
    name: "每日记忆归档"
    schedule: "30 00 * * *"
    group: memory
    script: "scheduler.py"
    args: ["run", "archive"]
    timeout: 600
    retry: 0
    notify: none
    depends: []

  - id: knowledge_graph
    name: "知识图谱更新"
    schedule: "00 01 * * *"
    group: memory
    script: "scheduler.py"
    args: ["run", "knowledge-graph"]
    timeout: 600
    retry: 0
    notify: none
    depends: []

  - id: log_rotate
    name: "日志轮转"
    schedule: "00 03 * * *"
    group: system
    script: "scripts/log_rotate.sh"
    timeout: 300
    retry: 0
    notify: none
    depends: []

  - id: feishu_sync
    name: "飞书知识同步"
    schedule: "00 06 * * *"
    group: data
    script: "scripts/feishu-bitable-sync.sh"
    timeout: 600
    retry: 1
    notify: failure
    depends: []

  - id: morning_greeting
    name: "早安问候"
    schedule: "00 08 * * *"
    group: report
    script: "kilo/broadcaster.py"
    args: ["--task", "send", "--message", "🔔 早安！系统状态正常", "--target", "group"]
    timeout: 60
    retry: 0
    notify: none
    depends: []

  - id: task_summary
    name: "每日任务汇总"
    schedule: "05 08 * * *"
    group: report
    script: "task-status-collector.sh"
    timeout: 120
    retry: 0
    notify: failure
    depends: ["morning_greeting"]

#===============================================================
# 每周任务
#===============================================================
weekly:

  sunday:
    - id: system_maintenance
      name: "系统维护"
      schedule: "00 02 * * 0"
      group: system
      script: "scripts/system-maintenance.sh"
      timeout: 600
      retry: 0
      notify: failure

    - id: ouc_cleanup
      name: "OUC清理"
      schedule: "00 03 * * 0"
      group: system
      script: "scripts/ouc-cleanup.sh"
      timeout: 600
      retry: 0
      notify: failure

  monday:
    - id: file_cleanup
      name: "文件清理"
      schedule: "00 03 * * 1"
      group: system
      script: "scripts/file-cleanup.sh"
      timeout: 600
      retry: 0
      notify: failure

    - id: security_scan
      name: "每周安全扫描"
      schedule: "00 04 * * 1"
      group: security
      script: "scripts/security-scan.sh"
      timeout: 600
      retry: 0
      notify: failure

    - id: health_check
      name: "每周健康检查"
      schedule: "30 06 * * 1"
      group: health
      script: "health-monitor.sh"
      timeout: 300
      retry: 0
      notify: failure

#===============================================================
# 每月任务
#===============================================================
monthly:

  - id: memory_deep_analyze
    name: "月度记忆深度分析"
    schedule: "00 02 1 * *"
    group: memory
    script: "scheduler.py"
    args: ["run", "analyze-daily"]
    timeout: 3600
    retry: 0
    notify: failure
    interpreter: "python3"
    cwd: "~/.openclaw/workspace/skills/memory-suite-v4"

  - id: backup_archive
    name: "月度归档备份"
    schedule: "00 04 1 * *"
    group: backup
    script: "backup-runner.sh"
    args: ["--type", "archive"]
    timeout: 3600
    retry: 1
    notify: success

  - id: evolution_monthly
    name: "每月深度进化"
    schedule: "00 10 1 * *"
    group: memory
    script: "scheduler.py"
    args: ["run", "evolution-monthly"]
    timeout: 3600
    retry: 0
    notify: failure

  - id: evolution_report
    name: "自我进化报告"
    schedule: "00 09 2 * *"
    group: report
    script: "scheduler.py"
    args: ["run", "evolution-report"]
    timeout: 600
    retry: 0
    notify: failure
