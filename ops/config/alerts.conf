#===============================================================================
# alerts.conf - 告警配置
#===============================================================================
# 路径: ~/.openclaw/ops/config/alerts.conf
#===============================================================================

# 告警级别定义
ALERT_LEVEL_P0="P0"   # 严重：备份完全失败、数据丢失
ALERT_LEVEL_P1="P1"   # 警告：备份部分失败、验证不通过
ALERT_LEVEL_P2="P2"   # 提醒：任务超时、重试成功
ALERT_LEVEL_P3="P3"   # 通知：正常完成

# 磁盘空间告警阈值（百分比）
ALERT_DISK_LOCAL_WARNING=80
ALERT_DISK_LOCAL_CRITICAL=90
ALERT_DISK_BACKUP_WARNING=70
ALERT_DISK_BACKUP_CRITICAL=85
ALERT_DISK_CLOUD_WARNING=80
ALERT_DISK_CLOUD_CRITICAL=90

# 内存告警阈值（百分比）
ALERT_MEMORY_WARNING=80
ALERT_MEMORY_CRITICAL=90

# 备份告警阈值
ALERT_BACKUP_CONTINUOUS_FAILURE=2  # 连续失败 N 次则 P0
ALERT_BACKUP_SIZE_MIN_KB=100        # 最小备份大小

# 任务告警阈值
ALERT_TASK_DAILY_FAILURE=3          # 每日失败任务数超过 N 则 P1

# SSH 失败登录告警
ALERT_SSH_FAILED_LOGIN=100

# 通知方式
NOTIFY_FEISHU="true"
NOTIFY_FEISHU_GROUP="broadcast"  # broadcast 或具体群ID

# 通知静默时间（避免重复告警，单位：秒）
NOTIFY_COOLDOWN=3600  # 1小时

# 是否启用飞书通知
FEISHU_NOTIFY_ENABLED="true"

# 飞书广播脚本路径
FEISHU_BROADCASTER="$HOME/.openclaw/workspace/agents/kilo/broadcaster.py"
