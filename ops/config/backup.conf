#===============================================================================
# backup.conf - 备份系统配置
#===============================================================================
# 路径: ~/.openclaw/ops/config/backup.conf
#===============================================================================

# 核心路径
export HOME_DIR="$HOME"
export OPENCLAW_DIR="$HOME/.openclaw"
export WORKSPACE_DIR="$OPENCLAW_DIR/workspace"
export OPS_DIR="$OPENCLAW_DIR/ops"

# 备份源路径
export BACKUP_SOURCE_DIRS=(
    "$WORKSPACE_DIR/memory"
    "$WORKSPACE_DIR/skills"
    "$WORKSPACE_DIR/config"
    "$WORKSPACE_DIR/AGENTS.md"
    "$WORKSPACE_DIR/SOUL.md"
    "$WORKSPACE_DIR/USER.md"
    "$WORKSPACE_DIR/IDENTITY.md"
)

# 备份目标路径（本地外部存储）
export BACKUP_DIR="/Volumes/cu/ocu"
export BACKUP_LOCAL_DIR="/Volumes/cu/ocu/full-backups"
export BACKUP_ARCHIVE_PREFIX="openclaw-backup"

# 云端备份
export BACKUP_CLOUD_ENABLED="true"
export BACKUP_CLOUD_HOST="root@106.54.25.161"
export BACKUP_CLOUD_DIR="/data/openclaw-backups"
export BACKUP_CLOUD_SSH_KEY="$HOME/.ssh/id_ed25519"
export BACKUP_CLOUD_RSYNC_OPTS="-avz --timeout=120"

# 备份保留策略
export BACKUP_LOCAL_RETENTION_DAYS="7"
export BACKUP_CLOUD_RETENTION_DAYS="7"

# 备份大小阈值（字节）
export BACKUP_MIN_SIZE="102400"  # 100KB
export BACKUP_EXPECT_SIZE="10485760"  # 10MB

# 验证设置
export VERIFY_STEP1_ENABLED="true"
export VERIFY_STEP2_ENABLED="true"
export VERIFY_STEP3_ENABLED="true"
export VERIFY_STEP4_ENABLED="true"

# 验证大小阈值
export VERIFY_SIZE_MIN_KB="100"  # 最小 100KB

# 可恢复性测试
export VERIFY_RECOVERY_TEST_ENABLED="true"
export VERIFY_RECOVERY_TEST_DIR="/tmp/openclaw-recovery-test"

# 日志
export BACKUP_LOG_DIR="$OPS_DIR/logs/backup"
export BACKUP_STATUS_DIR="$OPS_DIR/status/backup"
export BACKUP_LOCK_DIR="$OPS_DIR/lock"

# 通知
export BACKUP_NOTIFY_ON_SUCCESS="false"
export BACKUP_NOTIFY_ON_FAILURE="true"

# 超时（秒）
export BACKUP_CORE_TIMEOUT="1800"  # 30分钟
export BACKUP_CLOUD_TIMEOUT="600"   # 10分钟
export BACKUP_VERIFY_TIMEOUT="300"  # 5分钟

# 并发
export BACKUP_PARALLEL="false"  # 串行备份

# 路径白名单（备份时包含）
export BACKUP_INCLUDE_PATTERNS=(
    "memory/"
    "skills/"
    "AGENTS.md"
    "SOUL.md"
    "USER.md"
    "IDENTITY.md"
)

# 路径黑名单（备份时排除）
export BACKUP_EXCLUDE_PATTERNS=(
    "*.pyc"
    "__pycache__"
    "*.log"
    ".git"
    "node_modules"
    "venv"
    ".venv"
    "*.tmp"
    ".DS_Store"
    "downloads"
    "media"
    "canvas"
)
