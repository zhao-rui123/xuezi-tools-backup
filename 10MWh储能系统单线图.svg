  <text x="300" y="180" text-anchor="middle" font-size="10">KYN28-12</text>
  <text x="300" y="200" text-anchor="middle" font-size="9">10kV</text>
  
  <!-- 变压器 -->
  <circle cx="500" cy="180" r="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
