  <line x1="970" y1="140" x2="1050" y2="265" stroke="#d32f2f" stroke-width="2"/>
  <text x="1000" y="100" text-anchor="middle" font-size="9" fill="#d32f2f">DC1500V</text>
  
  <line x1="970" y1="240" x2="1050" y2="85" stroke="#d32f2f" stroke-width="2"/>
  <line x1="970" y1="240" x2="1050" y2="175" stroke="#d32f2f" stroke-width="2"/>
  <line x1="970" y1="240" x2="1050" y2="265" stroke="#d32f2f" stroke-width="2"/>
  
  <!-- 控制线 -->
  <line x1="700" y1="230" x2="700" y2="300" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="750" y1="300" x2="910" y2="180" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="750" y1="310" x2="910" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="910" y1="180" x2="1110" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="910" y1="180" x2="1110" y2="175" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="910" y1="180" x2="1110" y2="265" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="800" y="290" text-anchor="middle" font-size="8" fill="#666">RS485/CAN</text>
  
  <!-- 系统参数框 -->
  <rect x="50" y="400" width="350" height="180" fill="white" stroke="#333" stroke-width="1" rx="5"/>
  <text x="225" y="425" text-anchor="middle" font-size="14" font-weight="bold">系统技术参数</text>
  
  <text x="70" y="455" font-size="11">• 额定容量: 10.32MWh (3×3.44MWh)</text>
  <text x="70" y="475" font-size="11">• 额定功率: 5000kW (2×2500kW)</text>
  <text x="70" y="495" font-size="11">• 直流电压: 1500V (1331.2V标称)</text>
  <text x="70" y="515" font-size="11">• 交流电压: 10kV/690V</text>
  <text x="70" y="535" font-size="11">• 电芯规格: 314Ah磷酸铁锂</text>
  <text x="70" y="555" font-size="11">• 单簇配置: 1P416S (215kWh)</text>
  <text x="70" y="575" font-size="11">• 系统效率: ≥85%</text>
  
  <!-- 电池簇详情 -->
  <rect x="450" y="400" width="350" height="180" fill="white" stroke="#333" stroke-width="1" rx="5"/>
  <text x="625" y="425" text-anchor="middle" font-size="14" font-weight="bold">电池簇参数 (314Ah电芯)</text>
  
  <text x="470" y="455" font-size="11">• 单簇容量: 215kWh (1P416S)</text>
  <text x="470" y="475" font-size="11">• 标称电压: 1331.2V (416×3.2V)</text>
  <text x="470" y="495" font-size="11">• 额定容量: 314Ah</text>
  <text x="470" y="515" font-size="11">• 可用能量: 376kWh (90%DOD)</text>
  <text x="470" y="535" font-size="11">• 最大电流: 314A (1C)</text>
  <text x="470" y="555" font-size="11">• 单柜簇数: 16簇 (3.44MWh)</text>
  <text x="470" y="575" font-size="11">• 循环寿命: ≥6000次</text>
  
  <!-- 电缆清册摘要 -->
  <rect x="850" y="400" width="320" height="180" fill="white" stroke="#333" stroke-width="1" rx="5"/>
  <text x="1010" y="425" text-anchor="middle" font-size="14" font-weight="bold">主要电缆规格</text>
  
  <text x="870" y="455" font-size="11">• 直流电缆: ZC-YJV22-2×300mm²</text>
  <text x="870" y="475" font-size="11">• 交流电缆: ZC-YJV22-4×400mm²</text>
  <text x="870" y="495" font-size="11">• 变压器进线: ZC-YJV22-4×500mm²</text>
  <text x="870" y="515" font-size="11">• 高压电缆: YJV22-3×185mm²</text>
  <text x="870" y="535" font-size="11">• 控制电缆: ZR-RVSP-2×1.5mm²</text>
  <text x="870" y="555" font-size="11">• 接地电缆: BV-1×50mm²</text>
  <text x="870" y="575" font-size="11">• 敷设方式: 电缆沟/桥架</text>
  
  <!-- 图例 -->
  <rect x="50" y="620" width="1100" height="150" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
