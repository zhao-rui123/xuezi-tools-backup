  <text x="110" y="195" text-anchor="middle" font-size="10">并网点</text>
  
  <!-- 高压开关柜 -->
  <rect x="250" y="130" width="100" height="100" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
