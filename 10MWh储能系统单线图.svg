<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    10MWh工商业储能系统单线图
  </text>
  <text x="600" y="65" text-anchor="middle" font-size="14" fill="#666">
    314Ah磷酸铁锂电芯 | 1500V直流 | 10kV并网
  </text>
  
  <!-- 并网点 -->
  <rect x="50" y="150" width="120" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
